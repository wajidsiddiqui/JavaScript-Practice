<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Spotlight Reveal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="rain"></div>
        <div class="spotlight"></div>
        <div class="content">
            <h1 id="matrix-text">MATRIX</h1>
            <p class="subtitle">
                Initializing secure connection...
            </p>
            <p class="description">
            Welcome to the Matrix Interface. Every character is encrypted and
            dynamically revealed using random scrambling animation. Move your
            mouse to control the spotlight and click replay to restart the
            sequence.
            </p>
            <button id="replay-button">Replay</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
